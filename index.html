<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genius Assistant</title>
    <link rel="stylesheet" href="style.css">
    <!-- Add Marked.js for markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>
    <div class="header">
        <div> Genius Assistant</div>
    </div>
    <div class="chat-container" id="chat-container">
        <div class="message assistant">
            <div class="bubble">how can I help you today i'm a smart genius assistant</div>
        </div>
    </div>
    <div class="input-container">
        <div class="input-box">
            <input type="text" id="chat-input" placeholder="Message Genius Assistant..." autocomplete="off">
            <button id="send-btn" disabled>
                <svg viewBox="0 0 24 24">
                    <path d="M4 12l1.41 1.41L11 7.83V20h2V7.83l5.58 5.59L20 12l-8-8-8 8z"></path>
                </svg>
            </button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
